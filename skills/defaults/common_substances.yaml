# よく使う物質とデフォルト条件
# ChemEng - 化学工学計算モジュール

substances:
  water:
    cas: "7732-18-5"
    formula: "H2O"
    molecular_weight: 18.015
    typical_conditions:
      temperature_range: [273, 373]  # K
      pressure: 101325  # Pa

  ethanol:
    cas: "64-17-5"
    formula: "C2H5OH"
    molecular_weight: 46.07
    typical_conditions:
      temperature_range: [273, 351]
      pressure: 101325

  methanol:
    cas: "67-56-1"
    formula: "CH3OH"
    molecular_weight: 32.04
    typical_conditions:
      temperature_range: [273, 338]
      pressure: 101325

  benzene:
    cas: "71-43-2"
    formula: "C6H6"
    molecular_weight: 78.11
    typical_conditions:
      temperature_range: [278, 353]
      pressure: 101325

  toluene:
    cas: "108-88-3"
    formula: "C7H8"
    molecular_weight: 92.14
    typical_conditions:
      temperature_range: [273, 384]
      pressure: 101325

  acetone:
    cas: "67-64-1"
    formula: "C3H6O"
    molecular_weight: 58.08
    typical_conditions:
      temperature_range: [273, 329]
      pressure: 101325

  ammonia:
    cas: "7664-41-7"
    formula: "NH3"
    molecular_weight: 17.03
    typical_conditions:
      temperature_range: [200, 400]
      pressure: 101325

  nitrogen:
    cas: "7727-37-9"
    formula: "N2"
    molecular_weight: 28.01
    typical_conditions:
      temperature_range: [77, 500]
      pressure: 101325

  oxygen:
    cas: "7782-44-7"
    formula: "O2"
    molecular_weight: 32.00
    typical_conditions:
      temperature_range: [90, 500]
      pressure: 101325

# 計算タイプ別デフォルト条件
default_conditions:
  property_estimation:
    temperature: 298.15  # K (25°C)
    pressure: 101325     # Pa (1 atm)

  mass_balance:
    temperature: 298.15
    pressure: 101325
    basis: "molar"  # molar or mass

  distillation:
    pressure: 101325          # Pa (1 atm)
    feed_condition: 1.0       # 飽和液 (q=1)
    reflux_ratio_factor: 1.3  # 最小還流比の倍率

  heat_exchanger:
    pressure_drop_allowed: 50000  # Pa
    fouling_factor: 0.0002        # m²K/W

  reactor:
    residence_time: 3600  # s (1 hour)
    conversion_target: 0.9

# 単位変換係数
unit_conversions:
  temperature:
    K_to_C: -273.15
    C_to_K: 273.15
  pressure:
    atm_to_Pa: 101325
    bar_to_Pa: 100000
    psi_to_Pa: 6894.76
  flow:
    kmol_h_to_mol_s: 0.2778
    kg_h_to_kg_s: 0.000278
