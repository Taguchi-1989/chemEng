# 計算タイプ別デフォルト条件
default_conditions:
  property_estimation:
    temperature: 298.15  # K (25°C)
    pressure: 101325     # Pa (1 atm)

  mass_balance:
    temperature: 298.15
    pressure: 101325
    basis: "molar"  # molar or mass

  distillation:
    pressure: 101325          # Pa (1 atm)
    feed_condition: 1.0       # 飽和液 (q=1)
    reflux_ratio_factor: 1.3  # 最小還流比の倍率

  heat_exchanger:
    pressure_drop_allowed: 50000  # Pa
    fouling_factor: 0.0002        # m²K/W

  reactor:
    residence_time: 3600  # s (1 hour)
    conversion_target: 0.9

# 単位変換係数
unit_conversions:
  temperature:
    K_to_C: -273.15
    C_to_K: 273.15
  pressure:
    atm_to_Pa: 101325
    bar_to_Pa: 100000
    psi_to_Pa: 6894.76
  flow:
    kmol_h_to_mol_s: 0.2778
    kg_h_to_kg_s: 0.000278
